<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages App</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#000;color:#fff}
.wrap{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;padding-bottom:8px}
.top{display:flex;justify-content:space-between;font-size:12px;padding:8px 12px}
.header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.12)}
.peer{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:999px;background:linear-gradient(135deg,#64d66a,#3db14b);display:grid;place-items:center}
.name{font-weight:600}.state{font-size:12px;opacity:.7}
.tools{display:flex;gap:6px}
.tool{border:0;border-radius:10px;background:#1d1d1d;color:#fff;padding:6px 8px;font-size:11px}
.chat{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:78%;padding:8px 12px;border-radius:16px;font-size:14px;line-height:1.35}
.in{align-self:flex-start;background:#252525}
.out{align-self:flex-end;background:#34c759;color:#06210f}
.time{display:block;font-size:10px;opacity:.7;margin-top:3px}
.typing{font-size:12px;opacity:.7;padding:0 12px 8px;display:none}
.quick{display:flex;gap:6px;overflow:auto;padding:6px 10px;border-top:1px solid rgba(255,255,255,.08)}
.chip{border:0;border-radius:12px;background:#161616;color:#ddd;padding:6px 10px;font-size:12px;white-space:nowrap}
.bar{display:flex;gap:8px;padding:10px;border-top:1px solid rgba(255,255,255,.12);background:#0f0f0f}
input{flex:1;border-radius:16px;border:1px solid rgba(255,255,255,.2);background:#1a1a1a;color:#fff;padding:10px 12px}
button{border:0;border-radius:14px;background:#0a84ff;color:#fff;padding:10px 12px;font-weight:600}
</style>
</head>

  </div>
  <div class="chat" id="chat"></div>
  <div class="typing" id="typing">Печатает...</div>
  <div class="quick" id="quick">
    <button class="chip">Привет ❤️</button>
    <button class="chip">Как ты?</button>
    <button class="chip">Где ты?</button>
    <button class="chip">Люблю тебя</button>
  </div>
  <div class="bar"><input id="txt" placeholder="iMessage"><button id="send" type="button">Отправить</button></div>

const key="myMessagesAppV3",chat=document.getElementById("chat"),txt=document.getElementById("txt");
const typing=document.getElementById("typing"),state=document.getElementById("state");
let lang="ru";
function loadMessages(){
  try{
    const raw = localStorage.getItem(key);
    if(!raw) return [{t:"Привет ❤️",me:false,ts:Date.now()}];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [{t:"Привет ❤️",me:false,ts:Date.now()}];
  }catch(error){
    return [{t:"Привет ❤️",me:false,ts:Date.now()}];
  }
}
let data=loadMessages();
function persist(){localStorage.setItem(key,JSON.stringify(data));}
function tm(ts){const d=new Date(ts);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function render(){chat.innerHTML="";data.forEach(m=>{const d=document.createElement("div");d.className="msg "+(m.me?"out":"in");d.innerHTML=`${m.t}<span class="time">${tm(m.ts||Date.now())}</span>`;chat.appendChild(d);});chat.scrollTop=chat.scrollHeight;}

function fakeTyping(on){typing.style.display=on?"block":"none";state.textContent=on?"iMessage · печатает...":"iMessage · online";}
function send(textOverride){
  const v=(textOverride ?? txt.value).trim(); if(!v) return;
  data.push({t:v,me:true,ts:Date.now()}); txt.value=""; persist(); render();
  fakeTyping(true);
  setTimeout(()=>{data.push({t:botReply(v),me:false,ts:Date.now()});fakeTyping(false);persist();render();},7000+Math.random()*7000);
}
txt.addEventListener("keydown",e=>{if(e.key==="Enter")send();});
document.getElementById("send").addEventListener("click", () => send());
document.getElementById("send").addEventListener("touchend", (e) => { e.preventDefault(); send(); }, { passive: false });
document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>send(c.textContent)));
document.getElementById("clearBtn").onclick=()=>{data=[];persist();render();};
document.getElementById("langBtn").onclick=()=>{lang=lang==="ru"?"tj":"ru";document.getElementById("langBtn").textContent=lang==="ru"?"TJ":"RU";};
document.getElementById("exportBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="messages-export.json";a.click();URL.revokeObjectURL(a.href);
};
function tick(){const n=new Date();document.getElementById("clock").textContent=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");}

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App</title>
<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(170deg, #1d0e2e 0%, #12203d 55%, #0b1328 100%);
    color: #fff;
}
.phone {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 14px 14px 24px;
}
.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0.9;
    font-size: 13px;
    margin-bottom: 14px;
}
.card {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 22px;
    padding: 14px;
    backdrop-filter: blur(10px);
}
.title {
    margin: 0 0 4px;
    font-size: 22px;
}

.cover {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 20px;
    background: linear-gradient(135deg, #ff4f81, #8a5bff);
    display: grid;
    place-items: center;
    font-size: 70px;
    box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
}
.song {
    margin: 14px 0 8px;
    font-size: 20px;
    font-weight: bold;
}
.artist {
    margin: 0 0 12px;
    opacity: 0.85;
}
.progress-wrap {
    margin: 10px 0 14px;
}
#progress {
    width: 100%;
}
.times {
    margin-top: 6px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    opacity: 0.85;
}
.controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
}
.btn {
    border: 0;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.16);
    color: #fff;
    padding: 12px 14px;
    font-size: 20px;
    cursor: pointer;
}
.btn.play {
    padding: 14px 18px;
    background: #ff4f81;
}
.playlist {
    margin-top: 14px;
}
.playlist h3 {
    margin: 0;
}
.playlist-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    gap: 8px;
}
.playlist-count {
    font-size: 12px;
    opacity: 0.85;
}
.playlist-tools {
    display: flex;
    align-items: center;
    gap: 8px;
}
.search-input {
    width: 60px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    background: rgba(255,255,255,0.12);
    color: #fff;
    font-size: 12px;
    padding: 6px 8px;
}
.refresh-btn {
    border: 0;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
}
.playlist-status {
    margin-top: 8px;
    font-size: 12px;
    opacity: 0.85;
    min-height: 16px;
}
.playlist-list {
    max-height: 260px;
    overflow: auto;
    padding-right: 4px;
}
.track {
    width: 100%;
    margin-top: 8px;
    border: 0;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.09);
    color: #fff;
    padding: 10px 12px;
    text-align: left;
    cursor: pointer;
}
.track.active {
    background: rgba(255, 79, 129, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.3);
}
.track .fav {
    float: right;
    opacity: 0.9;
}
</style>
</head>
<body>
<div class="phone">
    <div class="top">
        <span id="clock">00:00</span>
        <span>📶 🔋</span>
    </div>

    <div class="card">
        <h1 class="title">Music</h1>
        <div class="cover">🎵</div>
        <p class="song" id="songTitle">Romantic Mood</p>
        <p class="artist" id="songArtist">Marifat Player</p>

        <div class="progress-wrap">
            <input type="range" id="progress" min="0" max="100" value="0">
            <div class="times">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="prevBtn">⏮</button>
            <button class="btn play" id="playBtn">▶</button>
            <button class="btn" id="nextBtn">⏭</button>
            <button class="btn" id="stopBtn">⏹</button>
            <button class="btn" id="favBtn">♡</button>
        </div>

        <div class="playlist">
            <div class="playlist-head">
                <h3>Плейлист</h3>
                <div class="playlist-tools">
                    <span class="playlist-count" id="playlistCount">0 треков</span>
                    <input id="searchInput" class="search-input" placeholder="Поиск">
                    <button class="refresh-btn" onclick="refreshPlaylist()">Обновить</button>
                </div>
            </div>
            <div class="playlist-list" id="playlist"></div>
            <div class="playlist-status" id="playlistStatus"></div>
        </div>
    </div>
</div>

<audio id="audio"></audio>

<script src="song/playlist.js"></script>
<script>
let tracks = [];
let filtered = [];
const favKey = "musicFavoritesV1";
let favorites = JSON.parse(localStorage.getItem(favKey) || "[]");

let index = 0;
let isPlaying = false;

const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const stopBtn = document.getElementById("stopBtn");
const progress = document.getElementById("progress");
const songTitle = document.getElementById("songTitle");
const songArtist = document.getElementById("songArtist");
const currentTimeEl = document.getElementById("currentTime");
const durationEl = document.getElementById("duration");
const playlistEl = document.getElementById("playlist");
const playlistCountEl = document.getElementById("playlistCount");
const playlistStatusEl = document.getElementById("playlistStatus");
const searchInput = document.getElementById("searchInput");
const favBtn = document.getElementById("favBtn");

function setPlaylistStatus(text) {
    playlistStatusEl.innerText = text;
}

function fmt(sec) {
    if (!isFinite(sec)) return "0:00";
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ":" + String(s).padStart(2, "0");
}

function renderPlaylist() {
    playlistEl.innerHTML = "";
    const query = (searchInput.value || "").toLowerCase().trim();
    filtered = tracks
        .map((t, i) => ({ ...t, _i: i }))
        .filter(t => !query || t.title.toLowerCase().includes(query) || t.artist.toLowerCase().includes(query));
    playlistCountEl.innerText = filtered.length + " / " + tracks.length;
    filtered.forEach((t) => {
        const btn = document.createElement("button");
        btn.className = "track" + (t._i === index ? " active" : "");
        const isFav = favorites.includes(t.src);
        btn.innerHTML = `${t._i + 1}. ${t.title} - ${t.artist}<span class="fav">${isFav ? "★" : "☆"}</span>`;
        btn.onclick = () => {
            index = t._i;
            loadTrack();
            play();
        };
        playlistEl.appendChild(btn);
    });
}

function loadTrack() {
    if (!tracks.length) {
        songTitle.innerText = "Нет треков";
        songArtist.innerText = "Добавь файлы в папку song";
        audio.removeAttribute("src");
        progress.value = 0;
        currentTimeEl.innerText = "0:00";
        durationEl.innerText = "0:00";
        renderPlaylist();
        return;
    }

    const track = tracks[index];
    songTitle.innerText = track.title;
    songArtist.innerText = track.artist;
    audio.src = track.src;
    progress.value = 0;
    currentTimeEl.innerText = "0:00";
    durationEl.innerText = "0:00";
    favBtn.innerText = favorites.includes(track.src) ? "♥" : "♡";
    renderPlaylist();
}

function play() {
    if (!tracks.length) return;
    audio.play();
    isPlaying = true;
    playBtn.innerText = "⏸";
}

function pause() {
    audio.pause();
    isPlaying = false;
    playBtn.innerText = "▶";
}

function stop() {
    audio.pause();
    audio.currentTime = 0;
    isPlaying = false;
    playBtn.innerText = "▶";
}

playBtn.addEventListener("click", () => {
    if (isPlaying) pause();
    else play();
});

prevBtn.addEventListener("click", () => {
    if (!tracks.length) return;
    index = (index - 1 + tracks.length) % tracks.length;
    loadTrack();
    play();
});

nextBtn.addEventListener("click", () => {
    if (!tracks.length) return;
    index = (index + 1) % tracks.length;
    loadTrack();
    play();
});

stopBtn.addEventListener("click", stop);
favBtn.addEventListener("click", () => {
    if (!tracks.length) return;
    const src = tracks[index].src;
    if (favorites.includes(src)) favorites = favorites.filter(x => x !== src);
    else favorites.push(src);
    localStorage.setItem(favKey, JSON.stringify(favorites));
    loadTrack();
});
searchInput.addEventListener("input", renderPlaylist);

audio.addEventListener("loadedmetadata", () => {
    durationEl.innerText = fmt(audio.duration);
});

audio.addEventListener("timeupdate", () => {
    if (!audio.duration) return;
    progress.value = (audio.currentTime / audio.duration) * 100;
    currentTimeEl.innerText = fmt(audio.currentTime);
});

progress.addEventListener("input", () => {
    if (!audio.duration) return;
    audio.currentTime = (progress.value / 100) * audio.duration;
});

audio.addEventListener("ended", () => {
    if (!tracks.length) return;
    index = (index + 1) % tracks.length;
    loadTrack();
    play();
});

async function loadPlaylist() {
    setPlaylistStatus("Загрузка плейлиста...");
    if (Array.isArray(window.PLAYLIST_DATA) && window.PLAYLIST_DATA.length) {
        tracks = window.PLAYLIST_DATA;
        index = 0;
        loadTrack();
        setPlaylistStatus("Плейлист загружен.");
        return;
    }

    try {
        const response = await fetch("song/playlist.json", { cache: "no-store" });
        if (!response.ok) throw new Error("playlist not found");
        const data = await response.json();
        tracks = Array.isArray(data) ? data : [];
    } catch (error) {
        tracks = [];
    }

    index = 0;
    loadTrack();
    setPlaylistStatus(tracks.length ? "Плейлист загружен." : "Плейлист пуст.");
}

async function refreshPlaylist() {
    setPlaylistStatus("Обновление...");
    try {
        const response = await fetch("song/playlist.json?ts=" + Date.now(), { cache: "no-store" });
        if (!response.ok) throw new Error("playlist not found");
        const data = await response.json();
        tracks = Array.isArray(data) ? data : [];
        index = 0;
        loadTrack();
        setPlaylistStatus("Обновлено: " + tracks.length + " треков.");
    } catch (error) {
        setPlaylistStatus("Не удалось обновить. Проверь playlist.json");
    }
}

function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        String(now.getHours()).padStart(2, "0") + ":" +
        String(now.getMinutes()).padStart(2, "0");
}

setInterval(updateClock, 1000);
updateClock();
loadPlaylist();
</script>
</body>
</html>

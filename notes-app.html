<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes App</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f4efcf;color:white}
.wrap{max-width:430px;margin:0 auto;min-height:100vh;padding:10px;background-color: black;}
.top{display:flex;justify-content:space-between;font-size:12px;opacity:.85;margin-bottom:8px}
.card{background:darkorange;border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:12px}
h1{margin:0;font-size:32px}.sub{opacity:.7;margin:2px 0 10px;font-size:13px}
textarea{width:90%;min-height:150px;border-radius:12px;border:1px solid rgba(0,0,0,.18);background:#fffce9;color:#111;padding:10px}
.row{display:flex;gap:8px;margin-top:8px}
.btn{border:0;border-radius:10px;background:#ffd95a;color:#3a2c00;padding:9px 12px;font-weight:700}
.list{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.item{background:#fff7cc;border:1px solid rgba(0,0,0,.1);border-radius:10px;padding:8px;cursor:pointer}
.meta{font-size:11px;opacity:.65;margin-top:4px}
</style>
</head>
<body>
<div class="wrap"><div class="top"><span id="clock">00:00</span><span>📶 🔋</span></div><div class="card">
<h1>Notes</h1><p class="sub">Личные заметки</p>
<textarea id="noteText" placeholder="Начни писать..."></textarea>
<div class="row"><button class="btn" id="saveBtn">Сохранить</button><button class="btn" id="newBtn">Новая</button><button class="btn" id="deleteBtn">Удалить</button></div>
<div class="list" id="notesList"></div>
</div></div>
<script>
const key="myNotesAppV2";let notes=JSON.parse(localStorage.getItem(key)||"[]"),active=-1;
const text=document.getElementById("noteText"),list=document.getElementById("notesList");
function fmt(ts){const d=new Date(ts);return d.toLocaleDateString("ru-RU")+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function persist(){localStorage.setItem(key,JSON.stringify(notes));}
function render(){list.innerHTML="";notes.forEach((n,i)=>{const d=document.createElement("div");d.className="item";d.innerHTML=`<div>${(n.text.slice(0,70)||"Пусто")}</div><div class="meta">${fmt(n.updatedAt)}</div>`;d.onclick=()=>{active=i;text.value=notes[i].text;};list.appendChild(d);});}
document.getElementById("saveBtn").onclick=()=>{const v=text.value.trim();if(!v)return;if(active>=0){notes[active].text=v;notes[active].updatedAt=Date.now();}else notes.unshift({id:crypto.randomUUID(),text:v,updatedAt:Date.now()});active=-1;text.value="";persist();render();};
document.getElementById("newBtn").onclick=()=>{active=-1;text.value="";};
document.getElementById("deleteBtn").onclick=()=>{if(active<0)return;notes.splice(active,1);active=-1;text.value="";persist();render();};
function tick(){const n=new Date();document.getElementById("clock").textContent=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");}
setInterval(tick,1000);tick();render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0a14;
  --surface: #171122;
  --surface2: #1e1630;
  --accent: #ff4f81;
  --accent2: #c45aff;
  --gold: #ffb347;
  --text: #f0eaf8;
  --muted: rgba(240,234,248,0.45);
  --border: rgba(255,255,255,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.phone {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 14px 14px 24px;
  background: radial-gradient(ellipse at 60% 0%, rgba(196,90,255,0.13) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 100%, rgba(255,79,129,0.1) 0%, transparent 55%),
              var(--bg);
}

.statusbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  opacity: 0.7;
  margin-bottom: 18px;
  padding: 0 2px;
}

/* Header */
.header {
  margin-bottom: 20px;
}

.header-top {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 14px;
}

.title-block h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 38px;
  line-height: 1;
  background: linear-gradient(135deg, #fff 30%, var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.title-block p {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}

.header-actions {
  display: flex;
  gap: 8px;
}

.icon-btn {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.15s;
}

.icon-btn:active { transform: scale(0.92); }
.icon-btn:hover { background: var(--surface2); }

/* Editor */
.editor-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}

.editor-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 20px 20px 0 0;
}

.editor-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  min-height: 130px;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.65;
  resize: none;
}

textarea::placeholder { color: var(--muted); }

.editor-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  gap: 8px;
}

.char-count {
  font-size: 11px;
  color: var(--muted);
}

.btn-row {
  display: flex;
  gap: 8px;
}

.btn {
  border: none;
  border-radius: 12px;
  padding: 9px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #ff7da2);
  color: #fff;
  box-shadow: 0 4px 14px rgba(255,79,129,0.3);
}

.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(255,79,129,0.4); }
.btn-primary:active { transform: translateY(0); }

.btn-ghost {
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}

.btn-ghost:hover { color: var(--text); }

.btn-danger {
  background: rgba(255, 59, 59, 0.15);
  color: #ff6b6b;
  border: 1px solid rgba(255,59,59,0.2);
}

/* Notes list */
.list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.list-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.notes-count {
  font-size: 11px;
  color: var(--muted);
  background: var(--surface2);
  border-radius: 999px;
  padding: 3px 10px;
}

.notes-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.note-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.note-item::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
  border-radius: 3px 0 0 3px;
  opacity: 0;
  transition: opacity 0.2s;
}

.note-item:hover { background: var(--surface2); transform: translateX(2px); }
.note-item:hover::after { opacity: 1; }

.note-item.active-item {
  background: var(--surface2);
  border-color: rgba(255,79,129,0.25);
}

.note-item.active-item::after { opacity: 1; }

.note-preview {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 8px;
}

.note-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--muted);
}

.note-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.6;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}

.empty .emoji { font-size: 48px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 20px;
  border-radius: 14px;
  font-size: 13px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  transition: transform 0.3s cubic-bezier(.2,.85,.25,1);
  z-index: 999;
  white-space: nowrap;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span id="clock">00:00</span>
    <span>📶 🔋</span>
  </div>

  <div class="header">
    <div class="header-top">
      <div class="title-block">
        <h1>Notes</h1>
        <p>Личные заметки</p>
      </div>
      <div class="header-actions">
        <button class="icon-btn" title="Новая заметка" onclick="newNote()">✏️</button>
      </div>
    </div>
  </div>

  <div class="editor-card">
    <div class="editor-label">Заметка</div>
    <textarea id="noteText" placeholder="Напиши что-нибудь..."></textarea>
    <div class="editor-footer">
      <span class="char-count" id="charCount">0 символов</span>
      <div class="btn-row">
        <button class="btn btn-danger" id="deleteBtn" onclick="deleteNote()">Удалить</button>
        <button class="btn btn-ghost" id="newBtn" onclick="newNote()">Новая</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveNote()">Сохранить</button>
      </div>
    </div>
  </div>

  <div class="list-header">
    <span class="list-title">Все заметки</span>
    <span class="notes-count" id="notesCount">0</span>
  </div>

  <div class="notes-list" id="notesList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE_KEY = "myNotesAppV2";
let notes = JSON.parse(localStorage.getItem(STORE_KEY) || "[]");
let active = -1;

const textEl = document.getElementById("noteText");
const listEl = document.getElementById("notesList");
const charCountEl = document.getElementById("charCount");
const countEl = document.getElementById("notesCount");

textEl.addEventListener("input", () => {
  charCountEl.textContent = textEl.value.length + " символов";
});

function fmt(ts) {
  const d = new Date(ts);
  const today = new Date();
  const isToday = d.toDateString() === today.toDateString();
  if (isToday) {
    return "Сегодня " + String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
  }
  return d.toLocaleDateString("ru-RU", {day:"numeric", month:"short"}) + " " +
         String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
}

function persist() { localStorage.setItem(STORE_KEY, JSON.stringify(notes)); }

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function render() {
  listEl.innerHTML = "";
  countEl.textContent = notes.length;

  if (!notes.length) {
    listEl.innerHTML = `<div class="empty"><div class="emoji">📝</div><p>Нет заметок. Напиши первую!</p></div>`;
    return;
  }

  notes.forEach((n, i) => {
    const el = document.createElement("div");
    el.className = "note-item" + (i === active ? " active-item" : "");
    el.innerHTML = `
      <div class="note-preview">${n.text.replace(/</g,"&lt;") || "Пусто"}</div>
      <div class="note-meta">
        <span class="note-dot"></span>
        <span>${fmt(n.updatedAt)}</span>
      </div>
    `;
    el.onclick = () => {
      active = i;
      textEl.value = notes[i].text;
      charCountEl.textContent = notes[i].text.length + " символов";
      render();
      textEl.focus();
    };
    listEl.appendChild(el);
  });
}

function saveNote() {
  const v = textEl.value.trim();
  if (!v) return;
  if (active >= 0) {
    notes[active].text = v;
    notes[active].updatedAt = Date.now();
    showToast("✅ Сохранено");
  } else {
    notes.unshift({ id: crypto.randomUUID(), text: v, updatedAt: Date.now() });
    active = 0;
    showToast("✅ Заметка создана");
  }
  persist();
  render();
}

function newNote() {
  active = -1;
  textEl.value = "";
  charCountEl.textContent = "0 символов";
  render();
  textEl.focus();
}

function deleteNote() {
  if (active < 0) return;
  notes.splice(active, 1);
  active = -1;
  textEl.value = "";
  charCountEl.textContent = "0 символов";
  persist();
  render();
  showToast("🗑 Удалено");
}

function tick() {
  const n = new Date();
  document.getElementById("clock").textContent =
    String(n.getHours()).padStart(2,"0") + ":" + String(n.getMinutes()).padStart(2,"0");
}

setInterval(tick, 1000);
tick();
render();
</script>
</body>
</html>
